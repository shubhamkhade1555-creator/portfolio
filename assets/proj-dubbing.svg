<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Movie Dubbing Pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1714"/><stop offset="1" stop-color="#0C0B0A"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6E83FF"/><stop offset="1" stop-color="#E87A52"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g fill="#2A2620"><circle cx="170" cy="180" r="3"/><circle cx="1010" cy="240" r="3"/><circle cx="940" cy="660" r="3"/><circle cx="260" cy="720" r="3"/><circle cx="600" cy="120" r="2.5"/></g>
  <!-- multi-speaker waveform -->
  <g transform="translate(0,450)" stroke="url(#wave)" stroke-width="9" stroke-linecap="round" opacity="0.9">
    <line x1="180" y1="-30" x2="180" y2="30"/><line x1="225" y1="-90" x2="225" y2="90"/><line x1="270" y1="-50" x2="270" y2="50"/>
    <line x1="315" y1="-140" x2="315" y2="140"/><line x1="360" y1="-70" x2="360" y2="70"/><line x1="405" y1="-180" x2="405" y2="180"/>
    <line x1="450" y1="-100" x2="450" y2="100"/><line x1="495" y1="-200" x2="495" y2="200"/><line x1="540" y1="-120" x2="540" y2="120"/>
    <line x1="585" y1="-170" x2="585" y2="170"/><line x1="630" y1="-60" x2="630" y2="60"/><line x1="675" y1="-150" x2="675" y2="150"/>
    <line x1="720" y1="-90" x2="720" y2="90"/><line x1="765" y1="-200" x2="765" y2="200"/><line x1="810" y1="-110" x2="810" y2="110"/>
    <line x1="855" y1="-160" x2="855" y2="160"/><line x1="900" y1="-70" x2="900" y2="70"/><line x1="945" y1="-130" x2="945" y2="130"/>
    <line x1="990" y1="-50" x2="990" y2="50"/><line x1="1035" y1="-90" x2="1035" y2="90"/>
  </g>
  <text x="80" y="800" font-family="Georgia,'Times New Roman',serif" font-size="64" font-style="italic" fill="#F0ECE3">Movie Dubbing Pipeline</text>
  <text x="82" y="845" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" letter-spacing="3" fill="#8E887D">MULTI-SPEAKER · WHISPER · F5-TTS</text>
</svg>

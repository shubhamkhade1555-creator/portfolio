 <!-- shop-floor CCTV frame -->
 <g transform="translate(430,440)">

 </g>

 <!-- compliance panel -->
 <g transform="translate(2900,440)" font-family="Consolas">
   <rect width="510" height="1330" rx="20" fill="#16130F" stroke="#332b22" stroke-width="3"/>
   <text x="40" y="80" fill="#8E887D" font-size="34" letter-spacing="4">COMPLIANCE</text>

     <rect width="430" height="300" rx="14" fill="#0f0d0b" stroke="#241f19" stroke-width="2"/>

   <g transform="translate(40,480)" font-size="40">

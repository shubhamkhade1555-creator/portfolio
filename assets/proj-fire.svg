  <path d="M600 150 C660 250 720 290 700 380 C690 430 640 470 600 470 C560 470 510 430 500 380 C485 300 560 270 600 150 Z" fill="#E87A52"/>
  <path d="M600 250 C630 310 650 340 638 390 C632 420 615 445 600 445 C585 445 568 420 562 390 C555 350 585 330 600 250 Z" fill="#1A1714"/>

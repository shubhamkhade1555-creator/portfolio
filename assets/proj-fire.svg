  <rect width="1200" height="900" fill="url(#bg3)"/>
  <g fill="#2A2620"><circle cx="160" cy="180" r="3"/><circle cx="1040" cy="220" r="3"/><circle cx="980" cy="650" r="3"/><circle cx="250" cy="700" r="3"/></g>
  <ellipse cx="600" cy="330" rx="320" ry="240" fill="url(#heat)"/>

      <stop offset="0" stop-color="#1A1714"/><stop offset="1" stop-color="#0C0B0A"/>
    </linearGradient>
    <radialGradient id="heat" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0" stop-color="#E87A52" stop-opacity="0.9"/><stop offset="0.6" stop-color="#D8623A" stop-opacity="0.35"/><stop offset="1" stop-color="#D8623A" stop-opacity="0"/>

  <text x="80" y="800" font-family="Georgia,'Times New Roman',serif" font-size="64" font-style="italic" fill="#F0ECE3">CCTV Fire Intelligence</text>
  <text x="82" y="845" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" letter-spacing="3" fill="#8E887D">REAL-TIME · OPENCV · CNN · ZERO NEW HW</text>
